apiVersion: apps/v1
kind: Deployment
metadata:
  name: directus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directus
  template:
    metadata:
      labels:
        app: directus
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: directus
          image: directus/directus:11
          ports:
            - containerPort: 8055
          env:
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: secret-key
            - name: DB_CLIENT
              value: pg
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: directus
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: db-password
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: admin-password
            - name: STORAGE_LOCATIONS
              value: local
            - name: STORAGE_LOCAL_ROOT
              value: /directus/uploads
            - name: PUBLIC_URL
              value: https://cms.aquis-mana.de
          volumeMounts:
            - name: uploads
              mountPath: /directus/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: directus-uploads-pvc
